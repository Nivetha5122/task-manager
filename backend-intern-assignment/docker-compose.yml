version: '3.8'

services:
  api:
    build: .
    container_name: task-manager-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - MONGO_URI=mongodb://mongo:27017/task_manager_db
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    container_name: task-manager-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
